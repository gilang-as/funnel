name: Images

on:
  release:
    types: [published]

permissions:
  contents: read
  # Required for SBOM and provenance attestation uploads
  id-token: write
  attestations: write

jobs:
  build:
    name: Image / ${{ matrix.cmd }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cmd: [standalone, manager, worker]

    steps:
      - uses: actions/checkout@v4

      # ── Multi-arch builder ────────────────────────────────────────────────────

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Auth ──────────────────────────────────────────────────────────────────

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Tags & OCI labels ─────────────────────────────────────────────────────

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/funnel
          tags: |
            type=raw,value=${{ matrix.cmd }}-${{ github.event.release.tag_name }}
            type=raw,value=${{ matrix.cmd }}-latest
            type=raw,value=${{ matrix.cmd }}
          labels: |
            org.opencontainers.image.title=funnel-${{ matrix.cmd }}
            org.opencontainers.image.description=Funnel ${{ matrix.cmd }} — torrent-to-S3 streaming downloader
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      # ── Build & push ──────────────────────────────────────────────────────────

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            CMD=${{ matrix.cmd }}
            VERSION=${{ github.event.release.tag_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cmd }}-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cmd }}-${{ github.ref_name }}
          sbom: true
          provenance: true
